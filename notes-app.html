<!DOCTYPE html>
<html>
    <head>
        <title>Notes App</title>

        <style>
            body{
                font-family: Arial;
                background:linear-gradient(to right,#4facfe,#00f2fe);
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                margin:0;
            }
            .container{
                background: white;
                padding: 25px;
                border-radius: 12px;
                width: 400px;
                box-shadow: 0 10 25px rgba(0,0,0,0.2);
            }
            h1{
                text-align: center;
                margin-bottom: 15px;
            }
            input,textarea{
                width: 100%;
                padding: 10px;
                margin-bottom: 10px;
                border-radius: 6px;
                border: 1px solid#ccc;
                outline: none;
            }
            textarea{
                height: 100px;
                resize: none;
            }
            button{
                padding: 8px 12px;
                background: #007bff;
                color: white;
                border: none;
                border-radius: 5px;
                cursor: pointer;
                margin: 3px;
            }
            .save-btn{
                background:#28a745 ;
                color: white;
            }
            .edit-btn{
                background: #ffc107;
            }
            .delete-btn{
                background: #dc3545;
            }
            button:hover{
                background: #0056b3;
            }
            .note{
                background: #eee;
                padding:10px;
                margin-top: 10px;
                border-radius: 8px;
                display: flex;
                justify-content: space-between;
                align-items: center;
                transition: 0.3s;
            }
            .note:hover{
                transform: scale(1.02);
                box-shadow: 0 5px 10px rgba(0,0,0,0.1);
            }
            .note span{
                flex: 1;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h1>Notes App</h1>

            <input type="text" id="searchInput" placeholder="Search notes..."
            onkeyup="searchNotes()">

            <textarea id="noteInput" placeholder="Write your notes here...">
            </textarea>

            <button class="save-btn" onclick="addNote()">Save Note</button>
            
                <div id="notesContainer"></div>
        </div>

        <script src="script4.js"></script>
    </body>
</html>
