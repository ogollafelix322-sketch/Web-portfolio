<!DOCTYPE html>
<html>
    <head>
        <title>My First Website</title>

        <style>
body{
    background-color: yellowgreen;
    font-family: Arial;
    text-align: center;
}
.card{
    background-color: white;
    width: 400px;
    margin: 50px auto;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0px 5px 15px rgb(185, 83, 83);
}
button{
    background-color: blue;
    color: white;
    padding: 10px 20px;
    border: none;

}
button:hover{
    background-color: darkblue;
}
.navbar{
    background-color: rgb(126, 218, 161);
    padding: 15px;
}
.navbar a{
    color: rgb(175, 52, 52);
    text-decoration:none ;
    margin: 10px;
    font-weight: bold;
}
.navbar a:hover{
    color: yellow;
    transition: 0.3s;
}
.profile{
    width: 150px;
    border-radius: 50%;
    margin-top: 20px;
}
<br><br>
section{
    height: 500px;
    padding: 20px;
}
#home{background: lightblue;}
#about{background: lightgreen;}
#contact{background: lightcoral;}
.container{
    display: flex;
    justify-content: center;
    gap: 20px;
}

.box{
    background: pink;
    padding: 20px;
    margin: 10px;
}
.ink{
    display: flex;

    align-items: center;

    .box{
        background: rgb(218, 75, 75);
        padding: 40px;
        border-radius: 10px;
    }

        padding: 40px;
        border-radius:10px ;
    }

    </head>

<div class="card">

    <button>Click Me</button>

</div>

<div class="navbar">
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#contact">Contact</a>
</div>

<section id="home">Home section</section>
<section id="about">About section</section>
<section id="contact">Contact section</section>

<div class="container">
    <div class="box">Box 1</div>
